# Match the nRF54L15 DK bootloader workarounds for the XIAO CPUAPP target.
CONFIG_FPROTECT=n
CONFIG_HW_STACK_PROTECTION=n
CONFIG_TICKLESS_KERNEL=y
CONFIG_BOOT_WATCHDOG_FEED=n
CONFIG_PM_OVERRIDE_EXTERNAL_DRIVER_CHECK=y

# The XIAO sample uses internal MRAM for both slots.
CONFIG_SPI=n
CONFIG_SPI_NOR=n
CONFIG_NORDIC_QSPI_NOR=n
