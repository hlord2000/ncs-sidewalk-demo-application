CONFIG_SID_END_DEVICE_HELLO=y
CONFIG_SIDEWALK_APPLICATION_NAME="hello.min"
CONFIG_SIDEWALK_LINK_MASK_LORA=y

# Drop sample/demo features that are not needed in the combined LoRa + Sidewalk build.
CONFIG_STATE_NOTIFIER=n
CONFIG_SIDEWALK_BUTTONS=n
CONFIG_SIDEWALK_DFU=n
CONFIG_SIDEWALK_CRYPTO_PSA_KEY_STORAGE=n
CONFIG_SIDEWALK_MFG_STORAGE_SUPPORT_HEX_v7=n
CONFIG_SIDEWALK_ASSERT=n
CONFIG_SIDEWALK_LOG=n
CONFIG_SIDEWALK_TEMPERATURE=n
CONFIG_SYS_HEAP_RUNTIME_STATS=n
CONFIG_BT_REMOTE_VERSION=n

# Trim sample-owned RAM while keeping the Sidewalk thread stack at its minimum.
CONFIG_HEAP_MEM_POOL_SIZE=2048
CONFIG_MBEDTLS_HEAP_SIZE=3072
CONFIG_SIDEWALK_HEAP_SIZE=4096
CONFIG_SID_END_DEVICE_EVENT_HEAP_SIZE=1024
CONFIG_SIDEWALK_THREAD_QUEUE_SIZE=8
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
