# Route the shell and console over Nordic UART Service so the browser can use
# Web Bluetooth instead of a wired UART terminal.
# Keep this shell on the default BT identity so it stays separate from the
# Sidewalk identity used by the endpoint stack.
CONFIG_BT_ZEPHYR_NUS=y
CONFIG_BT_ZEPHYR_NUS_AUTO_START_BLUETOOTH=n
CONFIG_UART_BT=y
CONFIG_BT_MAX_CONN=2
CONFIG_BT_EXT_ADV_MAX_ADV_SET=2
CONFIG_BT_CTLR_ADV_SET=2
CONFIG_BT_DEVICE_NAME="XIAO-WebShell"

CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
