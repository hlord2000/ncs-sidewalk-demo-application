# Route the shell and console over Nordic UART Service so the browser can use
# Web Bluetooth while keeping the board's default UART shell active.
# The BLE shell lives on the default BT identity and stays separate from the
# Sidewalk identity used by the endpoint stack.
CONFIG_SHELL_BT_NUS=y
CONFIG_SHELL_BT_NUS_INIT_LOG_LEVEL_DEFAULT=y
CONFIG_SHELL_BT_NUS_TX_RING_BUFFER_SIZE=2048
CONFIG_SHELL_BT_NUS_RX_RING_BUFFER_SIZE=512
CONFIG_BT_MAX_CONN=2
CONFIG_BT_EXT_ADV_MAX_ADV_SET=2
CONFIG_BT_CTLR_ADV_SET=2
CONFIG_BT_DEVICE_NAME="XIAO-WebShell"

CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
